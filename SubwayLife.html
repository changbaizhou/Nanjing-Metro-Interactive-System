    <!-- 初始化脚本 -->
    <script>
        
        document.getElementById('clearCircles').addEventListener('click', function() {
            if (window.clearCircles) {
                window.clearCircles();
            }
        });
        // 确保Font Awesome已加载
if (!document.querySelector('link[href*="font-awesome"]')) {
    const faLink = document.createElement('link');
    faLink.rel = 'stylesheet';
    faLink.href = 'https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css';
    document.head.appendChild(faLink);
}

// 点击分类按钮时显示/隐藏下拉菜单
document.querySelectorAll('.category-btn').forEach(btn => {
    btn.addEventListener('click', function(e) {
        e.stopPropagation();
        const dropdown = this.closest('.category-dropdown');
        
        // 关闭其他打开的下拉菜单
        document.querySelectorAll('.category-dropdown').forEach(d => {
            if (d !== dropdown) {
                d.querySelector('.dropdown-content').style.display = 'none';
            }
        });
        
        // 切换当前下拉菜单
        const content = dropdown.querySelector('.dropdown-content');
        content.style.display = content.style.display === 'block' ? 'none' : 'block';
    });
});

// 点击页面其他区域关闭所有下拉菜单
document.addEventListener('click', function() {
    document.querySelectorAll('.dropdown-content').forEach(content => {
        content.style.display = 'none';
    });
});

// 子分类点击处理
document.querySelectorAll('.subcategory-item').forEach(item => {
    item.addEventListener('click', function() {
        const category = this.closest('.category-dropdown').querySelector('.category-btn').textContent.trim();
        const itemName = this.textContent;
        console.log(`选择了 ${category} - ${itemName}`);
        // 这里可以添加实际的处理逻辑
    });
});
