<!DOCTYPE html>
<html lang="zh-CN">
<head>
     <link rel="icon" href="images/拥挤程度.png" type="image/png">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>地铁线路客流量分析</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        
        body {
            background: linear-gradient(135deg, #0d1b2a, #1b263b);
            color: #fff;
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            max-width: 1400px;
            margin: 0 auto;
        }
        
        header {
            position: relative;
            text-align: center;
            padding: 30px 0;
            margin-bottom: 30px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .btn-return {
            position: absolute;
            left: 0;
            top: 50%;
            transform: translateY(-50%);
            padding: 12px 24px;
            background: rgba(79, 172, 254, 0.2);
            border: 1px solid rgba(79, 172, 254, 0.5);
            border-radius: 30px;
            color: #e0f7fa;
            cursor: pointer;
            font-size: 1rem;
            font-weight: 500;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 8px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
        }
        
        .btn-return:hover {
            background: rgba(79, 172, 254, 0.3);
            transform: translateY(-50%) translateX(-5px);
            box-shadow: 0 6px 20px rgba(0, 0, 0, 0.3);
        }
        
        .btn-return i {
            font-size: 0.9rem;
        }
        
        header h1 {
            font-size: 3.5rem;
            margin-bottom: 10px;
            background: linear-gradient(to right, #4facfe, #00f2fe);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0 2px 10px rgba(0, 0, 0, 0.2);
            letter-spacing: 1px;
        }
        
        .divider {
            height: 4px;
            background: linear-gradient(to right, #00f2fe, #4facfe);
            width: 150px;
            margin: 15px auto;
            border-radius: 2px;
        }
        
        .dashboard {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 30px;
            margin-bottom: 40px;
        }
        
        .card {
            background: rgba(26, 38, 57, 0.7);
            border-radius: 15px;
            padding: 25px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            transition: transform 0.3s ease;
        }
        
        .card:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.4);
        }
        
        .card-header {
            display: flex;
            align-items: center;
            margin-bottom: 25px;
            padding-bottom: 15px;
            border-bottom: 2px solid rgba(62, 245, 255, 0.3);
        }
        
        .card-header i {
            font-size: 2rem;
            margin-right: 15px;
            color: #00f2fe;
        }
        
        .card-header h2 {
            font-size: 1.8rem;
            color: #4facfe;
        }
        
        .chart-container {
            height: 400px;
            position: relative;
        }
        
        .data-table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
        }
        
        .data-table th, .data-table td {
            padding: 15px;
            text-align: left;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }
        
        .data-table th {
            background-color: rgba(0, 242, 254, 0.2);
            color: #00f2fe;
            font-weight: 600;
        }
        
        .data-table tr:hover {
            background-color: rgba(255, 255, 255, 0.05);
        }
        
        .data-table tr:nth-child(even) {
            background-color: rgba(255, 255, 255, 0.03);
        }
        
        .stats-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 40px;
        }
        
        .stat-card {
            background: rgba(13, 27, 42, 0.6);
            border-radius: 12px;
            padding: 25px;
            text-align: center;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.2);
            transition: transform 0.3s ease;
            border: 1px solid rgba(0, 242, 254, 0.1);
        }
        
        .stat-card:hover {
            transform: translateY(-3px);
            background: rgba(13, 27, 42, 0.8);
        }
        
        .stat-card i {
            font-size: 2.5rem;
            margin-bottom: 15px;
            color: #4facfe;
        }
        
        .stat-card .value {
            font-size: 2.8rem;
            font-weight: 700;
            margin: 10px 0;
            color: #00f2fe;
            text-shadow: 0 0 10px rgba(0, 242, 254, 0.3);
        }
        
        .stat-card .label {
            font-size: 1.1rem;
            color: #e0f7fa;
        }
        
        footer {
            text-align: center;
            padding: 30px 0;
            color: rgba(255, 255, 255, 0.6);
            font-size: 1rem;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
            margin-top: 40px;
        }
        
        .highlight {
            color: #00f2fe;
            font-weight: bold;
        }
        
        .header-content {
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        
        .title-container {
            position: relative;
            padding: 0 50px;
        }
        
        @media (max-width: 992px) {
            .dashboard {
                grid-template-columns: 1fr;
            }
            
            header h1 {
                font-size: 2.8rem;
            }
            
            .btn-return {
                position: relative;
                top: auto;
                transform: none;
                margin: 0 auto 20px;
                align-self: center;
            }
            
            header {
                flex-direction: column;
            }
        }
        
        @media (max-width: 768px) {
            .btn-return {
                padding: 10px 20px;
            }
        }
        
        @media (max-width: 576px) {
            .card {
                padding: 15px;
            }
            
            .chart-container {
                height: 300px;
            }
            
            header h1 {
                font-size: 2.2rem;
            }
            
            .card-header h2 {
                font-size: 1.5rem;
            }
            
            .stat-card .value {
                font-size: 2.2rem;
            }
            
            .btn-return {
                padding: 8px 16px;
                font-size: 0.9rem;
            }
        }
    </style>

</head>
<body>


    <div class="container">
        <header>
            <button onclick="location.href='test1704.html'" class="btn-return">
                <i class="fas fa-arrow-left"></i> 返回
            </button>
            <div class="header-content">
                <div class="title-container">
                    <h1><i class="fas fa-subway"></i> 年客流量统计</h1>
                </div>
                <div class="divider"></div>
            </div>
        </header>
        
        <div class="stats-container">
            <div class="stat-card">
                <i class="fas fa-route"></i>
                <div class="value">13</div>
                <div class="label">地铁线路数量</div>
            </div>
            <div class="stat-card">
                <i class="fas fa-users"></i>
                <div class="value">293.97</div>
                <div class="label">总客流量（万人次）</div>
            </div>
            <div class="stat-card">
                <i class="fas fa-chart-line"></i>
                <div class="value">78.10</div>
                <div class="label">最高客流量（1号线）</div>
            </div>
            <div class="stat-card">
                <i class="fas fa-percentage"></i>
                <div class="value">26.57%</div>
                <div class="label">1号线客流占比</div>
            </div>
        </div>
        
        <div class="dashboard">
            <div class="card">
                <div class="card-header">
                    <i class="fas fa-chart-bar"></i>
                    <h2>各线路客流量柱状图</h2>
                </div>
                <div class="chart-container">
                    <canvas id="barChart"></canvas>
                </div>
            </div>
            
            <div class="card">
                <div class="card-header">
                    <i class="fas fa-chart-pie"></i>
                    <h2>客流量分布饼图</h2>
                </div>
                <div class="chart-container">
                    <canvas id="pieChart"></canvas>
                </div>
            </div>
        </div>
        
        <div class="card">
            <div class="card-header">
                <i class="fas fa-table"></i>
                <h2>地铁线路客流量数据</h2>
            </div>
            <table class="data-table">
                <thead>
                    <tr>
                        <th>线路</th>
                        <th>年平均客流量（万人次）</th>
                        <th>占比</th>
                    </tr>
                </thead>
                <tbody id="data-table-body">
                    <!-- 数据将通过JavaScript填充 -->
                </tbody>
            </table>
        </div>
        
        <footer>
            <p><span class="highlight">© 金陵地铁智行通</span> </p>
        </footer>
    </div>

    <script>
        // 地铁线路客流量数据
        const metroData = [
            { line: '1', passengers: 78.09807692 },
            { line: '2', passengers: 69.22142857 },
            { line: '3', passengers: 64.43708791 },
            { line: '4', passengers: 15.80934066 },
            { line: '5', passengers: 2.042582418 },
            { line: '7', passengers: 15.7293956 },
            { line: '10', passengers: 15.5260989 },
            { line: 'S1', passengers: 9.89010989 },
            { line: 'S3', passengers: 8.963736264 },
            { line: 'S6', passengers: 5.076373626 },
            { line: 'S7', passengers: 1.397527473 },
            { line: 'S8', passengers: 10.67774725 },
            { line: 'S9', passengers: 2.264835165 }
        ];
        
        // 计算总客流量
        const totalPassengers = metroData.reduce((sum, item) => sum + item.passengers, 0);
        
        // 准备柱状图数据
        const lineLabels = metroData.map(item => `${item.line}号线`);
        const passengerValues = metroData.map(item => item.passengers);
        
        // 准备饼图数据
        const pieData = metroData.map(item => ({
            label: `${item.line}号线`,
            passengers: item.passengers,
            percentage: (item.passengers / totalPassengers * 100).toFixed(2)
        }));
        
        // 按客流量排序（从高到低）
        pieData.sort((a, b) => b.passengers - a.passengers);
        
        // 生成饼图颜色
        const generateColors = (count) => {
            const colors = [];
            const hueStep = 360 / count;
            
            for (let i = 0; i < count; i++) {
                const hue = i * hueStep;
                colors.push(`hsl(${hue}, 70%, 60%)`);
            }
            
            return colors;
        };
        
        const pieColors = generateColors(metroData.length);
        
        // 创建柱状图
        const barCtx = document.getElementById('barChart').getContext('2d');
        new Chart(barCtx, {
            type: 'bar',
            data: {
                labels: lineLabels,
                datasets: [{
                    label: '年平均客流量（万人次）',
                    data: passengerValues,
                    backgroundColor: 'rgba(0, 242, 254, 0.7)',
                    borderColor: 'rgba(0, 242, 254, 1)',
                    borderWidth: 1,
                    borderRadius: 5,
                    hoverBackgroundColor: 'rgba(79, 172, 254, 0.9)'
                }]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                plugins: {
                    legend: {
                        labels: {
                            color: '#e0f7fa',
                            font: {
                                size: 14
                            }
                        }
                    },
                    tooltip: {
                        backgroundColor: 'rgba(0, 0, 0, 0.7)',
                        titleColor: '#00f2fe',
                        bodyColor: '#ffffff',
                        borderColor: 'rgba(0, 242, 254, 0.5)',
                        borderWidth: 1,
                        padding: 12,
                        callbacks: {
                            label: function(context) {
                                return `客流量: ${context.parsed.y.toFixed(2)} 万人次`;
                            }
                        }
                    }
                },
                scales: {
                    x: {
                        ticks: {
                            color: '#e0f7fa',
                            font: {
                                size: 12
                            }
                        },
                        grid: {
                            color: 'rgba(255, 255, 255, 0.1)'
                        }
                    },
                    y: {
                        beginAtZero: true,
                        ticks: {
                            color: '#e0f7fa',
                            font: {
                                size: 12
                            },
                            callback: function(value) {
                                return value + ' 万';
                            }
                        },
                        grid: {
                            color: 'rgba(255, 255, 255, 0.1)'
                        }
                    }
                }
            }
        });
        
        // 创建饼图
        const pieCtx = document.getElementById('pieChart').getContext('2d');
        new Chart(pieCtx, {
            type: 'pie',
            data: {
                labels: pieData.map(item => item.label),
                datasets: [{
                    data: pieData.map(item => item.passengers),
                    backgroundColor: pieColors,
                    borderColor: 'rgba(255, 255, 255, 0.3)',
                    borderWidth: 1,
                    hoverOffset: 15
                }]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                plugins: {
                    legend: {
                        position: 'right',
                        labels: {
                            color: '#e0f7fa',
                            font: {
                                size: 12
                            },
                            padding: 20,
                            generateLabels: function(chart) {
                                const data = chart.data;
                                if (data.labels.length && data.datasets.length) {
                                    return data.labels.map((label, i) => {
                                        const meta = chart.getDatasetMeta(0);
                                        const style = meta.controller.getStyle(i);
                                        
                                        return {
                                            text: `${label} (${pieData[i].percentage}%)`,
                                            fillStyle: style.backgroundColor,
                                            strokeStyle: style.borderColor,
                                            lineWidth: style.borderWidth,
                                            hidden: false,
                                            index: i
                                        };
                                    });
                                }
                                return [];
                            }
                        }
                    },
                    tooltip: {
                        backgroundColor: 'rgba(0, 0, 0, 0.7)',
                        titleColor: '#00f2fe',
                        bodyColor: '#ffffff',
                        borderColor: 'rgba(0, 242, 254, 0.5)',
                        borderWidth: 1,
                        padding: 12,
                        callbacks: {
                            label: function(context) {
                                const value = context.parsed;
                                const percentage = ((value / totalPassengers) * 100).toFixed(2);
                                return [`客流量: ${value.toFixed(2)} 万人次`, `占比: ${percentage}%`];
                            }
                        }
                    }
                }
            }
        });
        
        // 填充数据表格
        const tableBody = document.getElementById('data-table-body');
        metroData.forEach(item => {
            const percentage = ((item.passengers / totalPassengers) * 100).toFixed(2);
            const row = document.createElement('tr');
            
            row.innerHTML = `
                <td>${item.line}号线</td>
                <td>${item.passengers.toFixed(2)}</td>
                <td>${percentage}%</td>
            `;
            
            tableBody.appendChild(row);
        });
    </script>
</body>
</html>
