<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <link rel="icon" href="images/11-线路简介彩色.png" type="image/png">
  <meta charset="UTF-8" />
  <title>南京地铁线路简介</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <!-- Leaflet 地图样式 -->
  <link rel="stylesheet" href="leaflet/leaflet.css" />

  <!-- Leaflet 地图核心脚本（版本1.9.4） -->
<script src="leaflet/leaflet.js"></script>
<script src="config.example.js"></script>
<script src="config.local.js"></script>

  <!-- 自定义地图相关脚本 -->
  <script src="majormap.js"></script>
<script src="Location.js"></script> 

  <!-- 自定义页面样式 -->
  <link rel="stylesheet" href="xianlu.css" />
  <link rel="stylesheet" href="Location.css">

</head>

<body>


  <div class="page-wrapper">

    <!-- 顶部导航栏 -->
    <header contenteditable="true">
      <button onclick="location.href='webgis1.html'" class="btn-return">返回主页</button>
      <h1>金陵地铁智行通</h1>
    </header>

    <!-- 主体区域，左右布局 -->
    <div class="main-container" style="display: flex; height: 100%;">

      <!-- 左侧侧边栏：地铁线路按钮 -->
      <div class="sidebar">
        <h3>地铁线路</h3>
        <button onclick="selectLine('乘客守则')">
          <span class="icon"><img src="images/操作.png" alt="乘客守则" /></span> 乘客守则
        </button>
        <button onclick="selectLine('1号线')">
          <span class="icon"><img src="images/地铁1.png" alt="1号线图标" /></span> 1号线
        </button>
        <button onclick="selectLine('2号线')">
          <span class="icon"><img src="images/地铁2.png" alt="2号线图标" /></span> 2号线
        </button>
        <button onclick="selectLine('3号线')">
          <span class="icon"><img src="images/地铁3.png" alt="3号线图标" /></span> 3号线
        </button>
        <button onclick="selectLine('4号线')">
          <span class="icon"><img src="images/地铁4.png" alt="4号线图标" /></span> 4号线
        </button>
        <button onclick="selectLine('5号线')">
          <span class="icon"><img src="images/地铁5.png" alt="5号线图标" /></span> 5号线
        </button>
        <button onclick="selectLine('7号线')">
          <span class="icon"><img src="images/地铁7.png" alt="7号线图标" /></span> 7号线
        </button>
        <button onclick="selectLine('10号线')">
          <span class="icon"><img src="images/地铁10.png" alt="10号线图标" /></span> 10号线
        </button>
        <button onclick="selectLine('S1号线')">
          <span class="icon"><img src="images/地铁S1.png" alt="S1号线图标" /></span> S1号线
        </button>
        <button onclick="selectLine('S3号线')">
          <span class="icon"><img src="images/地铁S3.png" alt="S3号线图标" /></span> S3号线
        </button>
        <button onclick="selectLine('S6号线')">
          <span class="icon"><img src="images/地铁S6.png" alt="S6号线图标" /></span> S6号线
        </button>
        <button onclick="selectLine('S7号线')">
          <span class="icon"><img src="images/地铁S7.png" alt="S7号线图标" /></span> S7号线
        </button>
        <button onclick="selectLine('S8号线')">
          <span class="icon"><img src="images/地铁S8.png" alt="S8号线图标" /></span> S8号线
        </button>
        <button onclick="selectLine('S9号线')">
          <span class="icon"><img src="images/地铁S9.png" alt="S9号线图标" /></span> S9号线
        </button>
      </div>

      <!-- 图片显示框：列车时刻表和缩放按钮 -->
      <div class="image-box" style="width: 30%; padding: 10px; box-sizing: border-box; background: #f5f5f5; border-radius: 10px; margin-left: 10px;">
        <h4 style="text-align: center;">列车时刻表</h4>
        <div id="image-container" style="
          width: 100%;
          overflow-x: auto;  /* 允许横向滚动 */
          overflow-y: auto;  /* 允许纵向滚动 */
          display: block;
        "></div>

        <!-- 图片缩放控制按钮 -->
        <div id="zoom-buttons" style="
          max-width: 60px;
          margin: 10px auto 0 auto;
          display: flex;
          justify-content: center;
          gap: 10px;
        ">
          <button onclick="zoomImage(1.3)">+</button>
          <button onclick="zoomImage(0.9)">—</button>
        </div>
      </div>

      <!-- 右侧内容区：地图和文字介绍 -->
      <div class="right-container" style="flex: 1; display: flex; flex-direction: column; margin-left: 10px;">

        <!-- 地图区域 -->
        <div class="map-area" style="flex: 1; position: relative;">
          <div id="map" style="width: 100%; height: 100%;">地图加载中...</div>

          <!-- 地图缩放按钮 -->
          <div class="map-controls">
            <button id="zoom-in">+</button>
            <button id="zoom-out">-</button>
          </div>
        </div>

        <!-- 文字介绍区域 -->
        <div class="text-area" style="margin-top: 10px; overflow-y: auto; max-height: 200px; padding: 10px; background: #fafafa; border-radius: 8px;">
          <p>
            城市轨道交通是城市文明的重要窗口。为保障城市轨道交通运营安全与秩序，培养乘客文明素质，维护乘客合法权益，更好地为广大乘客服务，依据《南京市轨道交通条例》，特制定以下乘客守则，望广大乘客自觉遵守。
            <!-- 这里是默认显示的乘客守则内容 -->
          </p>
        </div>
      </div>
    </div> <!-- 关闭 main-container -->

    <!-- 页脚 -->
    <footer style="text-align: center; padding: 10px 0; font-size: 0.9em; color: #666;">
      &copy; 金陵地铁智行通
    </footer>
  </div> <!-- 关闭 page-wrapper -->

  <script>
    // 图片缩放相关变量
    let imageZoom = 1;
    const minZoom = 1;
    const maxZoom = 10;

    /**
     * 缩放列车时刻表图片
     * @param {number} factor 缩放因子，大于1放大，小于1缩小
     */

     
    function zoomImage(factor) {
      imageZoom = Math.min(maxZoom, Math.max(minZoom, imageZoom * factor));

      const images = document.querySelectorAll('#image-container img');
      images.forEach(img => {
        let baseWidthPercent = 100; // 基础宽度百分比
        let newWidthPercent = baseWidthPercent * imageZoom;
        img.style.width = newWidthPercent + '%';

        // 限制最大宽度，防止图片过大
        img.style.maxWidth = '800px';
        img.style.height = 'auto';
      });
    }

    // 地铁线路介绍数据存放对象
    let metroDescriptions = {};

    // 读取外部 JSON 文件，包含线路介绍和图片
    fetch('lines.json')
      .then(response => response.json())
      .then(data => {
        metroDescriptions = data;
      });

    /**
     * 根据用户选择的线路名称显示对应介绍和图片
     * @param {string} lineName 线路名称，如 '1号线' 或 '乘客守则'
     */

function highlightLine(lineName) {
  const mappedName = nameMapping[lineName] || lineName;  // 名称映射

  for (const name in overlayLayers) {
    const layer = overlayLayers[name];
    if (!layer || !layer.setStyle) continue;

    if (name === mappedName) {
      layer.setStyle({
        color: '#03FFEAFF',   // 亮蓝色（DeepSkyBlue）
        weight: 10,         // 线条更粗一点
        opacity: 1
      });
      // 放大范围时再放大一点
      const bounds = layer.getBounds();
      map.fitBounds(bounds.pad(-0.1));  // pad 放大边界，20%额外空间
    } else {
      const fileInfo = geojsonFiles.find(item => item.label === name);
      if (fileInfo) {
        layer.setStyle({
          color: fileInfo.color || '#000',
          weight: 4,
          opacity: 0.8
        });
      }
    }
  }
  
}


    function selectLine(lineName) {
      highlightLine(lineName);
      const textArea = document.querySelector('.text-area');
      const imageContainer = document.getElementById('image-container');
      imageContainer.innerHTML = "";  // 清空原有图片

      const lineData = metroDescriptions[lineName];

      if (lineData) {
        // 替换文本内容，支持换行显示
        textArea.innerHTML = `<p>${lineData.description.replace(/\n/g, '<br>')}</p>`;

        // 加载图片，支持单张或多张
        if (lineData.image) {
          const images = Array.isArray(lineData.image) ? lineData.image : [lineData.image];
          images.forEach(src => {
            const img = document.createElement("img");
            img.src = src;
            img.alt = lineName + " 图片";
            img.style.width = "100%";
            img.style.borderRadius = "10px";
            img.style.transition = "transform 0.3s ease";
            imageContainer.appendChild(img);
          });

          // 重置缩放比例
          imageZoom = 1;
        }
      } else {
        // 无数据时显示默认提示和默认图片
        textArea.innerHTML = `<p>暂无该线路介绍。</p>`;
        imageContainer.innerHTML = `<img src="images/default.png" alt="默认图片" style="width:100%; border-radius:10px;">`;
        imageZoom = 1;
      }
      
    }
  window.onload = function() {
    // 延迟确保所有资源加载完成（特别是地图或图片等）
   fetch('lines.json')
  .then(response => response.json())
  .then(data => {
    metroDescriptions = data;

    // 数据加载完成，调用默认选择
    selectLine('乘客守则');
  })
  .catch(err => {
    console.error("加载线路介绍失败:", err);
  });
  };
  </script>
  <button class="left-button" onclick="locateMe()" style="display:none;"></button>
  
</body>
</html>
