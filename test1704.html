        // 解析CSV数据
        const parsedData = Papa.parse(csvData, { header: true });
        
        // 提取日期（从第一行的字段名中提取，跳过"线路"）
        const dates = parsedData.meta.fields.slice(1);
        
        // 提取线路名称和对应的数据
        const lineNames = [];
        const data = [];
        
        parsedData.data.forEach(row => {
            if (row['线路']) {
                // 映射线路名称
                const nameMap = {
                    '1': '1号线',
                    '2': '2号线',
                    '3': '3号线',
                    '4': '4号线',
                    '5': '5号线',
                    '7': '7号线',
                    '10': '10号线',
                    'S1': 'S1号线',
                    'S3': 'S3号线',
                    'S6': 'S6号线',
                    'S7': 'S7号线',
                    'S8': 'S8号线',
                    'S9': 'S9号线'
                };
                
                const lineName = nameMap[row['线路']] || row['线路'];
                lineNames.push(lineName);
                
                // 提取该线路的所有数据
                const lineData = [];
                dates.forEach(date => {
                    const value = parseFloat(row[date]);
                    lineData.push(isNaN(value) ? 0 : value);
                });
                data.push(lineData);
            }
        });
        
        // 图表配置
        const CHUNK_SIZE = 30; // 一次显示30天的数据
        let currentIndex = 0;
        let animationSpeed = 3000; // 3秒更新一次
        let animationInterval;
        let isPlaying = true;
        let metroChart;
        
        // 地铁线路颜色（为所有线路分配颜色）
        const lineColors = [
            '#FF5252', '#FFD740', '#7C4DFF', '#18FFFF',
            '#FF6E40', '#00BFA5', '#69F0AE', '#FF4081',
            '#536DFE', '#FF6E40', '#00BFA5', '#8A2BE2', '#FF4500'
        ];
        
        // 初始化图表
        function initChart() {
            const ctx = document.getElementById('metroChart').getContext('2d');
            metroChart = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: dates.slice(currentIndex, currentIndex + CHUNK_SIZE),
                    datasets: lineNames.map((name, index) => ({
                        label: name,
                        data: data[index].slice(currentIndex, currentIndex + CHUNK_SIZE),
                        borderColor: lineColors[index],
                        backgroundColor: lineColors[index] + '33',
                        borderWidth: 3,
                        pointRadius: 3,
                        pointHoverRadius: 6,
                        tension: 0.3,
                        fill: false
                    }))
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: {
                        legend: {
                            position: 'top',
                            labels: {
                                color: '#fff',
                                font: {
                                    size: 14
                                }
                            }
                        },
                        tooltip: {
                            mode: 'index',
                            intersect: false,
                            backgroundColor: 'rgba(0, 0, 0, 0.7)',
                            titleColor: '#fff',
                            bodyColor: '#fff',
                            padding: 12,
                            cornerRadius: 6
                        }
                    },
                    scales: {
                        x: {
                            grid: {
                                color: 'rgba(255, 255, 255, 0.1)'
                            },
                            ticks: {
                                color: '#fff',
                                maxRotation: 45,
                                minRotation: 45
                            },
                            title: {
                                display: true,
                                text: '日期',
                                color: '#fff',
                                font: {
                                    size: 16,
                                    weight: 'bold'
                                }
                            }
                        },
                        y: {
                            grid: {
                                color: 'rgba(255, 255, 255, 0.1)'
                            },
                            ticks: {
                                color: '#fff',
                                callback: function(value) {
                                    return value.toLocaleString();
                                }
                            },
                            title: {
                                display: true,
                                text: '客流量 (万人次)',
                                color: '#fff',
                                font: {
                                    size: 16,
                                    weight: 'bold'
                                }
                            }
                        }
                    },
                    animation: {
                        duration: 1000,
                        easing: 'easeOutQuart'
                    },
                    interaction: {
                        mode: 'nearest',
                        axis: 'x',
                        intersect: false
                    }
                }
            });
        }
        
        // 更新图表数据
        function updateChart() {
            // 更新标签
            const newLabels = dates.slice(currentIndex, currentIndex + CHUNK_SIZE);
            metroChart.data.labels = newLabels;
            
            // 更新数据
            lineNames.forEach((_, index) => {
                metroChart.data.datasets[index].data = data[index].slice(currentIndex, currentIndex + CHUNK_SIZE);
            });
            
            // 更新摘要信息
            updateSummaryInfo();
            
            // 更新当前日期范围显示
            document.getElementById('timeRange').textContent = 
                `${newLabels[0]} 至 ${newLabels[newLabels.length - 1]}`;
            
            // 更新时间
            const now = new Date();
            document.getElementById('updateTime').textContent = 
                now.toLocaleString('zh-CN', { 
                    year: 'numeric', 
                    month: '2-digit', 
                    day: '2-digit',
                    hour: '2-digit',
                    minute: '2-digit',
                    second: '2-digit'
                });
            
            metroChart.update();
            
            // 更新索引
            currentIndex = (currentIndex + 1) % (dates.length - CHUNK_SIZE + 1);
        }
        
        // 更新摘要信息
        function updateSummaryInfo() {
            // 计算总客流量
            let total = 0;
            data.forEach(lineData => {
                total += lineData.slice(currentIndex, currentIndex + CHUNK_SIZE).reduce((a, b) => a + b, 0);
            });
            document.getElementById('totalPassengers').textContent = 
                total.toLocaleString('zh-CN', { maximumFractionDigits: 0 });
            
            // 找出最繁忙线路
            let maxLineIndex = 0;
            let maxValue = 0;
            data.forEach((lineData, index) => {
                const sum = lineData.slice(currentIndex, currentIndex + CHUNK_SIZE).reduce((a, b) => a + b, 0);
                if (sum > maxValue) {
                    maxValue = sum;
                    maxLineIndex = index;
                }
            });
            document.getElementById('busiestLine').textContent = lineNames[maxLineIndex];
            
            // 找出最高客流量
            let maxPassengers = 0;
            data.forEach(lineData => {
                const maxInLine = Math.max(...lineData.slice(currentIndex, currentIndex + CHUNK_SIZE));
                if (maxInLine > maxPassengers) maxPassengers = maxInLine;
            });
            document.getElementById('maxPassengers').textContent = 
                maxPassengers.toLocaleString('zh-CN', { maximumFractionDigits: 1 });
        }
        
        // 开始动画
        function startAnimation() {
            if (animationInterval) {
                clearInterval(animationInterval);
            }
            animationInterval = setInterval(updateChart, animationSpeed);
            isPlaying = true;
            document.getElementById('pauseBtn').textContent = '暂停动画';
        }
        
        // 暂停动画
        function pauseAnimation() {
            if (animationInterval) {
                clearInterval(animationInterval);
                animationInterval = null;
            }
            isPlaying = false;
            document.getElementById('pauseBtn').textContent = '继续动画';
        }
        
        // 重置视图
        function resetView() {
            currentIndex = 0;
            updateChart();
        }
        
        // 事件监听器
        document.getElementById('pauseBtn').addEventListener('click', function() {
            if (isPlaying) {
                pauseAnimation();
            } else {
                startAnimation();
            }
        });
        
        document.getElementById('resetBtn').addEventListener('click', resetView);
        
        document.getElementById('speedUpBtn').addEventListener('click', function() {
            animationSpeed = Math.max(500, animationSpeed - 500);
            if (isPlaying) {
                startAnimation();
            }
        });
        
        document.getElementById('speedDownBtn').addEventListener('click', function() {
            animationSpeed += 500;
            if (isPlaying) {
                startAnimation();
            }
        });
        
        // 初始化图表并开始动画
        initChart();
        updateSummaryInfo();
        startAnimation();
        updateChart();
    </script>
</body>
</html>
